name: Sync to Public Repo

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Remove private/AI files
        run: |
          rm -rf .claude/
          rm -rf .superpowers/
          rm -f CLAUDE.md
          rm -f .mcp.json
          rm -rf docs/design/
          rm -rf docs/plans/
          rm -rf docs/superpowers/
          rm -f .github/workflows/sync-public.yml
          rm -f .github/copilot-instructions.md

      - name: Clean .gitignore for public
        run: |
          sed -i '/^\.superpowers\/$/d' .gitignore
          sed -i '/^CLAUDE\.md$/d' .gitignore
          sed -i '/^\.claude\/$/d' .gitignore

      - name: Push to public repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "sync: update from private repo" --allow-empty
          git remote add public https://x-access-token:${{ secrets.PUBLIC_REPO_PAT }}@github.com/shanevbg/MilkRemote.git
          git push public master --force
